<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoQuest · World Geography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ocean:       #0d1b2a;
      --ocean-mid:   #1e3a5f;
      --land:        #c5b896;
      --land-hover:  #d4c8a8;
      --highlight:   #f4a261;
      --highlight2:  #e76f51;
      --correct:     #52b788;
      --wrong:       #e63946;
      --panel:       #0f2236;
      --border:      #1e3a5f;
      --text:        #e8e2d5;
      --text-dim:    #7a9bb5;
      --btn-bg:      #1a3550;
      --btn-hover:   #234668;
      --accent:      #4a9eda;
      --gold:        #f4c430;
      --states-land: #b8cce4;
      --states-bg:   #0d1b2a;
    }

    html, body { width: 100%; height: 100%; background: var(--ocean); font-family: 'Inter', sans-serif; color: var(--text); overflow: hidden; }

    #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

    /* ── Header ── */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 56px;
      background: var(--panel); border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 10; gap: 16px;
    }

    .logo {
      font-family: 'Playfair Display', serif; font-size: 20px;
      letter-spacing: 0.04em; color: var(--text);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }

    .logo-icon {
      width: 28px; height: 28px; background: var(--highlight);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 15px;
    }

    /* ── Mode Toggle ── */
    #mode-toggle {
      display: flex; gap: 4px;
      background: var(--ocean); border-radius: 8px; padding: 3px;
      border: 1px solid var(--border);
    }

    .mode-btn {
      padding: 5px 14px; background: transparent;
      border: none; border-radius: 6px;
      color: var(--text-dim); font-size: 13px; font-weight: 500;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: all 0.18s; white-space: nowrap;
    }

    .mode-btn:hover { color: var(--text); }
    .mode-btn.active { background: var(--btn-hover); color: var(--text); }

    /* ── Stats ── */
    #stats { display: flex; gap: 24px; flex-shrink: 0; }

    .stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); font-weight: 500; }
    .stat-value { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1; }

    /* ── Progress Bar ── */
    #progress-bar-wrap { height: 3px; background: var(--border); flex-shrink: 0; }
    #progress-bar { height: 100%; background: linear-gradient(90deg, var(--highlight), var(--highlight2)); width: 0%; transition: width 0.4s ease; }

    /* ── Main ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── Map ── */
    #map-container { flex: 1; position: relative; overflow: hidden; background: var(--ocean); }
    #world-map { width: 100%; height: 100%; display: block; }

    .country { fill: var(--land); cursor: default; transition: fill 0.25s ease; }

    /* US states default color — must come BEFORE highlighted/correct/wrong so those win */
    .mode-states .country { fill: var(--states-land); }

    /* These come after so they beat the default and the states override above */
    .country.highlighted { fill: var(--highlight) !important; filter: url(#glow); }
    .country.correct { fill: var(--correct) !important; filter: none; }
    .country.wrong   { fill: var(--wrong)   !important; filter: none; }

    .borders { fill: none; stroke: var(--ocean); stroke-width: 0.6px; pointer-events: none; }
    .borders-us { fill: none; stroke: var(--ocean); stroke-width: 0.8px; pointer-events: none; }
    .nation-outline { fill: none; stroke: var(--ocean-mid); stroke-width: 1px; pointer-events: none; opacity: 0.6; }
    .graticule { fill: none; stroke: var(--ocean-mid); stroke-width: 0.3px; opacity: 0.5; }

    #map-controls { position: absolute; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 4px; }

    .map-btn {
      width: 36px; height: 36px; background: var(--panel);
      border: 1px solid var(--border); color: var(--text);
      font-size: 18px; font-weight: 300; cursor: pointer;
      border-radius: 6px; display: flex; align-items: center;
      justify-content: center; transition: background 0.15s; line-height: 1;
    }
    .map-btn:hover { background: var(--btn-hover); }

    /* ── Game Panel ── */
    #game-panel {
      width: 320px; flex-shrink: 0;
      background: var(--panel); border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 24px 20px; gap: 20px; overflow-y: auto;
    }

    #question-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim); margin-bottom: 8px; }
    #question-text { font-size: 17px; font-weight: 600; line-height: 1.4; color: var(--text); }
    #region-hint { margin-top: 6px; font-size: 12px; color: var(--text-dim); height: 16px; }

    #answers { display: flex; flex-direction: column; gap: 10px; }

    .answer-btn {
      padding: 13px 16px; background: var(--btn-bg);
      border: 1.5px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 14px; font-weight: 500;
      font-family: 'Inter', sans-serif; cursor: pointer;
      text-align: left; transition: background 0.15s, border-color 0.15s, transform 0.1s;
      display: flex; align-items: center; gap: 10px;
      position: relative; overflow: hidden;
    }
    .answer-btn:hover:not(:disabled) { background: var(--btn-hover); border-color: var(--accent); transform: translateX(2px); }
    .answer-btn:disabled { cursor: default; }

    .answer-btn .letter {
      width: 24px; height: 24px; border-radius: 6px;
      background: var(--ocean-mid); font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--text-dim); letter-spacing: 0;
    }

    .answer-btn.correct-answer { background: rgba(82,183,136,0.2); border-color: var(--correct); color: var(--correct); }
    .answer-btn.correct-answer .letter { background: var(--correct); color: #fff; }
    .answer-btn.wrong-answer { background: rgba(230,57,70,0.15); border-color: var(--wrong); color: var(--wrong); }
    .answer-btn.wrong-answer .letter { background: var(--wrong); color: #fff; }

    .diff-badge {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; padding: 2px 6px; border-radius: 4px;
      opacity: 0; pointer-events: none;
    }
    .answer-btn.correct-answer .diff-badge,
    .answer-btn.wrong-answer .diff-badge { opacity: 1; }

    .diff-neighbor  { background: rgba(230,57,70,0.3);   color: #ff8a8f; }
    .diff-region    { background: rgba(244,162,97,0.3);  color: var(--highlight); }
    .diff-continent { background: rgba(74,158,218,0.3);  color: var(--accent); }
    .diff-global    { background: rgba(122,155,181,0.2); color: var(--text-dim); }

    /* ── Feedback ── */
    #feedback {
      min-height: 52px; border-radius: 10px; padding: 12px 14px;
      font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
      opacity: 0; transition: opacity 0.3s;
    }
    #feedback.visible { opacity: 1; }
    #feedback.correct-fb { background: rgba(82,183,136,0.15); border: 1px solid rgba(82,183,136,0.4); color: var(--correct); }
    #feedback.wrong-fb   { background: rgba(230,57,70,0.12);  border: 1px solid rgba(230,57,70,0.35);  color: #ff8a8f; }
    #feedback .fb-icon { font-size: 18px; }

    /* ── Score Screen ── */
    #score-screen {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 14px; padding: 24px;
    }
    #score-screen.visible { display: flex; }

    .score-globe { font-size: 52px; line-height: 1; }
    .score-title { font-family: 'Playfair Display', serif; font-size: 20px; }
    .score-big { font-size: 52px; font-weight: 700; color: var(--highlight); line-height: 1; }
    .score-grade { font-size: 14px; font-weight: 600; color: var(--gold); letter-spacing: 0.06em; text-transform: uppercase; }
    .score-accuracy { font-size: 13px; color: var(--text-dim); }

    #play-again {
      margin-top: 8px; padding: 13px 32px;
      background: var(--highlight); border: none; border-radius: 10px;
      color: var(--ocean); font-size: 15px; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer;
      letter-spacing: 0.02em; transition: background 0.2s, transform 0.1s;
    }
    #play-again:hover { background: var(--highlight2); transform: translateY(-1px); }

    /* ── Loading ── */
    #loading {
      position: absolute; inset: 0; background: var(--ocean);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 100;
    }
    .spinner { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--highlight); border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-dim); }

    @media (max-width: 768px) {
      #main { flex-direction: column; }
      #game-panel { width: 100%; flex-shrink: 0; height: auto; max-height: 50vh; border-left: none; border-top: 1px solid var(--border); }
      #stats { gap: 16px; }
      .stat-value { font-size: 17px; }
    }
  </style>
</head>

<div id="app">
  <div id="header">
    <div class="logo">
      <div class="logo-icon">🌍</div>
      GeoQuest
    </div>
    <div id="mode-toggle">
      <button class="mode-btn active" data-mode="world">🌍 World</button>
      <button class="mode-btn" data-mode="states">🗺 US States</button>
    </div>
    <div id="stats">
      <div class="stat">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="score-display">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Question</span>
        <span class="stat-value" id="q-counter">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Streak</span>
        <span class="stat-value" id="streak-display">0</span>
      </div>
    </div>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="main">
    <div id="map-container">
      <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Loading map…</div>
      </div>
      <svg id="world-map"></svg>
      <div id="map-controls">
        <button class="map-btn" id="zoom-in"    title="Zoom in">+</button>
        <button class="map-btn" id="zoom-out"   title="Zoom out">−</button>
        <button class="map-btn" id="zoom-reset" title="Reset view">⌂</button>
      </div>
    </div>
    <div id="game-panel">
      <div id="question-section">
        <div id="question-tag">Identify the region</div>
        <div id="question-text">Loading…</div>
        <div id="region-hint"></div>
      </div>
      <div id="answers"></div>
      <div id="feedback"></div>
      <div id="score-screen">
        <div class="score-globe" id="score-emoji">🌍</div>
        <div class="score-title">Round Complete</div>
        <div class="score-big" id="final-score-num">0/15</div>
        <div class="score-grade" id="final-grade"></div>
        <div class="score-accuracy" id="final-accuracy"></div>
        <button id="play-again">Play Again</button>
      </div>
    </div>
  </div>
</div>

// ═══════════════════════════════════════════════════════════════
//  UTILITY
// ═══════════════════════════════════════════════════════════════
const pickRandom = arr => arr[Math.floor(Math.random() * arr.length)];
const shuffle = arr => { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

// ═══════════════════════════════════════════════════════════════
//  TIERED WRONG ANSWER SELECTION
//  Uses continent (broad) and region (sub) from either DB.
// ═══════════════════════════════════════════════════════════════
function getWrongAnswers(correctId) {
  const db = MODES[currentMode].db;
  const correct = db[correctId];
  const nbrs = [...(neighborMap.get(correctId) || [])].filter(id => db[id]);
  const pool = validIds.filter(id => id !== correctId);
  const picked = new Set();
  const result = [];
  const diffLabels = {};

  function tryPick(candidates, label) {
    const avail = candidates.filter(id => !picked.has(id));
    if (!avail.length) return false;
    const id = pickRandom(avail);
    picked.add(id); result.push(id); diffLabels[id] = label;
    return true;
  }

  // Tier 1 — Hard: border neighbor (fall back to same region if island)
  tryPick(nbrs, 'neighbor') ||
  tryPick(pool.filter(id => db[id].region === correct.region), 'region');

  // Tier 2 — Medium: same sub-region (not already picked)
  tryPick(pool.filter(id => db[id].region === correct.region), 'region') ||
  tryPick(pool.filter(id => db[id].continent === correct.continent), 'continent');

  // Tier 3 — Easy: same broad area, different sub-region
  tryPick(
    pool.filter(id => db[id].continent === correct.continent && db[id].region !== correct.region),
    'continent'
  ) || tryPick(pool.filter(id => db[id].continent !== correct.continent), 'global');

  // Fill remaining
  while (result.length < 3) {
    const diff = pool.filter(id => db[id].continent !== correct.continent && !picked.has(id));
    const fb = diff.length ? diff : pool.filter(id => !picked.has(id));
    if (!fb.length) break;
    const id = pickRandom(fb); picked.add(id); result.push(id); diffLabels[id] = 'global';
  }

  return { ids: result, labels: diffLabels };
}

// ═══════════════════════════════════════════════════════════════
//  ZOOM TO FEATURE
// ═══════════════════════════════════════════════════════════════
function zoomToFeature(feature, duration = 750) {
  if (!feature) return;
  const [[x0, y0], [x1, y1]] = pathGen.bounds(feature);
  const bw = x1 - x0, bh = y1 - y0;

  if (!isFinite(x0) || bw > W * 0.7 || bw < 1 || bh < 1) {
    const [cx, cy] = pathGen.centroid(feature);
    if (!isFinite(cx)) return;
    const t = d3.zoomIdentity.translate(W / 2 - 3.5 * cx, H / 2 - 3.5 * cy).scale(3.5);
    svg.transition().duration(duration).call(zoomBehavior.transform, t);
    return;
  }

  const pad = 72;
  const scale = Math.min(
    (W - pad * 2) / Math.max(bw, 1),
    (H - pad * 2) / Math.max(bh, 1),
    14
  ) * 0.85;

  const t = d3.zoomIdentity
    .translate(W / 2 - scale * (x0 + x1) / 2, H / 2 - scale * (y0 + y1) / 2)
    .scale(scale);
  svg.transition().duration(duration).call(zoomBehavior.transform, t);
}

// ═══════════════════════════════════════════════════════════════
//  MAP RENDERING
// ═══════════════════════════════════════════════════════════════
function renderMap(topo, cfg) {
  projection = cfg.buildProjection(topo, W, H);
  pathGen    = d3.geoPath().projection(projection);

  if (cfg.useGraticule) {
    graticuleEl.datum(d3.geoGraticule()()).attr('d', pathGen).style('display', null);
  } else {
    graticuleEl.style('display', 'none');
  }

  const outlineDatum = cfg.outlineDatum ? cfg.outlineDatum(topo) : null;
  if (outlineDatum) {
    outlineEl.datum(outlineDatum).attr('d', pathGen).style('display', null);
  } else {
    outlineEl.style('display', 'none');
  }

  countriesG
    .attr('class', `countries-group ${cfg.landClass}`)
    .selectAll('path')
    .data(features)
    .join('path')
    .attr('class', 'country')
    .attr('id', d => `c${d.id}`)
    .attr('d', pathGen);

  bordersEl
    .datum(cfg.buildBordersDatum(topo))
    .attr('class', currentMode === 'states' ? 'borders-us' : 'borders')
    .attr('d', pathGen);
}

// ═══════════════════════════════════════════════════════════════
//  LOAD MODE DATA
// ═══════════════════════════════════════════════════════════════
async function loadMode(modeName) {
  if (modeCache[modeName]) return modeCache[modeName];

  const cfg = MODES[modeName];
  const topo = await d3.json(cfg.url);

  const geometries = topo.objects[cfg.objName].geometries;
  const neighborIdxs = topojson.neighbors(geometries);

  // us-atlas stores FIPS codes as strings ("01", "06"…); world-atlas uses numbers.
  // Normalize to numbers so they match the numeric keys in STATES/COUNTRIES.
  const norm = id => typeof id === 'string' ? +id : id;

  const nMap = new Map();
  geometries.forEach((geo, i) => {
    const id = norm(geo.id);
    nMap.set(id, new Set(neighborIdxs[i].map(j => norm(geometries[j].id))));
  });

  const fc = topojson.feature(topo, topo.objects[cfg.objName]);
  // Normalize feature IDs in-place so selectors like `#c6` stay consistent
  const feats = fc.features.map(f => (f.id = norm(f.id), f));
  const fbId = new Map(feats.map(f => [f.id, f]));
  const vIds = feats.map(f => f.id).filter(id => cfg.db[id] && !cfg.skip.has(id));

  const cache = { topo, features: feats, featureById: fbId, neighborMap: nMap, validIds: vIds };
  modeCache[modeName] = cache;
  return cache;
}

// ═══════════════════════════════════════════════════════════════
//  SWITCH MODE
// ═══════════════════════════════════════════════════════════════
async function switchMode(modeName) {
  if (modeName === currentMode && modeCache[modeName]) {
    startRound(); return;
  }

  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading').querySelector('.loading-text').textContent =
    modeName === 'states' ? 'Loading US map…' : 'Loading world map…';

  currentMode = modeName;

  // Update mode toggle buttons
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === modeName));

  const data = await loadMode(modeName);
  features    = data.features;
  featureById = data.featureById;
  neighborMap = data.neighborMap;
  validIds    = data.validIds;

  renderMap(data.topo, MODES[modeName]);

  // Reset map view
  svg.call(zoomBehavior.transform, d3.zoomIdentity);

  document.getElementById('loading').style.display = 'none';
  startRound();
}

// ═══════════════════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════════════════
function startRound() {
  score = 0; streak = 0; currentQ = 0; answered = false;

  questions = shuffle(validIds).slice(0, TOTAL).map(correctId => {
    const { ids: wrongIds, labels } = getWrongAnswers(correctId);
    const choices = shuffle([correctId, ...wrongIds]);
    return { correctId, choices, diffLabels: { [correctId]: 'correct', ...labels } };
  });

  document.getElementById('score-screen').classList.remove('visible');
  document.getElementById('score-screen').style.display = 'none';
  document.getElementById('answers').style.display = 'flex';
  document.getElementById('question-section').style.display = 'block';
  document.getElementById('question-tag').textContent = MODES[currentMode].questionTag;

  updateStats();
  showQuestion();
}

function showQuestion() {
  if (currentQ >= TOTAL) { showScoreScreen(); return; }
  answered = false;

  const q = questions[currentQ];
  const db = MODES[currentMode].db;
  const info = db[q.correctId];
  const feature = featureById.get(q.correctId);

  d3.selectAll('.country')
    .classed('highlighted', false).classed('correct', false).classed('wrong', false)
    .style('filter', null);

  d3.select(`#c${q.correctId}`).classed('highlighted', true);
  if (feature) zoomToFeature(feature);

  document.getElementById('question-text').textContent =
    currentMode === 'states' ? 'Which state is highlighted?' : 'Which country is highlighted?';
  document.getElementById('region-hint').textContent =
    MODES[currentMode].hintFn(q.correctId);

  const answersDiv = document.getElementById('answers');
  answersDiv.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  q.choices.forEach((id, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.dataset.id = id;

    const badge = document.createElement('span');
    badge.className = 'diff-badge';
    badge.dataset.diff = q.diffLabels[id] || 'global';

    btn.innerHTML = `<span class="letter">${letters[i]}</span>${db[id]?.name || 'Unknown'}`;
    btn.appendChild(badge);
    btn.addEventListener('click', () => handleAnswer(id));
    answersDiv.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = ''; fb.innerHTML = '';
  updateStats();
}

function handleAnswer(chosenId) {
  if (answered) return;
  answered = true;

  const q = questions[currentQ];
  const db = MODES[currentMode].db;
  const correct = chosenId === q.correctId;

  if (correct) { score++; streak++; } else { streak = 0; }

  d3.select(`#c${q.correctId}`).classed('highlighted', false).classed('correct', true).style('filter', null);
  if (!correct) d3.select(`#c${chosenId}`).classed('wrong', true);

  document.querySelectorAll('.answer-btn').forEach(btn => {
    btn.disabled = true;
    const id = parseInt(btn.dataset.id);
    const badge = btn.querySelector('.diff-badge');
    const diff = q.diffLabels[id] || 'global';

    if (id === q.correctId) {
      btn.classList.add('correct-answer');
      badge.textContent = '✓ Correct';
      badge.classList.add('diff-continent');
    } else if (id === chosenId && !correct) {
      btn.classList.add('wrong-answer');
      badge.textContent = diff === 'neighbor'   ? '⚡ Neighbor'      :
                          diff === 'region'     ? '~ Same division'  :
                          diff === 'continent'  ? '~ Same area'      : '✗ Wrong';
      badge.classList.add(`diff-${diff}`);
    } else {
      badge.textContent = diff === 'neighbor'  ? '⚡ Neighbor'    :
                          diff === 'region'    ? '~ Division'      :
                          diff === 'continent' ? '~ Area'          : '';
      if (badge.textContent) {
        badge.classList.add(`diff-${diff}`);
        badge.style.opacity = '0.5';
      }
    }
  });

  const fb = document.getElementById('feedback');
  if (correct) {
    fb.className = 'correct-fb visible';
    const msgs = ['Excellent!', 'Nailed it!', 'Perfect!', 'Well done!', "That's right!"];
    fb.innerHTML = `<span class="fb-icon">✓</span> ${pickRandom(msgs)}`;
  } else {
    fb.className = 'wrong-fb visible';
    fb.innerHTML = `<span class="fb-icon">✗</span> That's <strong>${MODES[currentMode].db[q.correctId].name}</strong>`;
  }

  updateStats();
  setTimeout(() => { currentQ++; showQuestion(); }, correct ? 1500 : 2200);
}

function showScoreScreen() {
  d3.selectAll('.country')
    .classed('highlighted', false).classed('correct', false).classed('wrong', false).style('filter', null);
  svg.transition().duration(800).call(zoomBehavior.transform, d3.zoomIdentity);

  document.getElementById('answers').style.display = 'none';
  document.getElementById('question-section').style.display = 'none';
  document.getElementById('feedback').className = '';

  const pct = Math.round((score / TOTAL) * 100);
  const isStates = currentMode === 'states';

  const grade = pct === 100 ? 'Perfect Score! 🏆'
    : pct >= 87  ? (isStates ? 'Geography Champion'    : 'Master Navigator')
    : pct >= 73  ? (isStates ? 'State Capital Scholar' : 'Skilled Explorer')
    : pct >= 53  ? (isStates ? 'Regional Enthusiast'   : 'Apprentice Cartographer')
    : pct >= 33  ? (isStates ? 'Map Curious'           : 'Curious Traveler')
    :              (isStates ? 'Need More Road Trips'  : 'Landlubber');

  document.getElementById('score-emoji').textContent = MODES[currentMode].emoji;
  document.getElementById('final-score-num').textContent = `${score}/${TOTAL}`;
  document.getElementById('final-grade').textContent = grade;
  document.getElementById('final-accuracy').textContent = `${pct}% accuracy`;

  const ss = document.getElementById('score-screen');
  ss.style.display = 'flex'; ss.classList.add('visible');
  document.getElementById('q-counter').textContent = `${TOTAL}/${TOTAL}`;
}

function updateStats() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('q-counter').textContent =
    currentQ < TOTAL ? `${currentQ + 1}/${TOTAL}` : `${TOTAL}/${TOTAL}`;
  document.getElementById('streak-display').textContent = streak;
  document.getElementById('progress-bar').style.width =
    (Math.min(currentQ, TOTAL) / TOTAL * 100) + '%';
}

// ═══════════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════════
document.getElementById('zoom-in').addEventListener('click', () =>
  svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.6));
document.getElementById('zoom-out').addEventListener('click', () =>
  svg.transition().duration(300).call(zoomBehavior.scaleBy, 1 / 1.6));
document.getElementById('zoom-reset').addEventListener('click', () =>
  svg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity));

document.getElementById('play-again').addEventListener('click', startRound);

document.querySelectorAll('.mode-btn').forEach(btn =>
  btn.addEventListener('click', () => switchMode(btn.dataset.mode)));

// ═══════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════
switchMode('world');
</script>
</body>
</html>
